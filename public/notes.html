<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes — PromptPad</title>
  <meta name="theme-color" content="#0d1117">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&family=Public+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0d1117;
      --card:   rgba(244,247,252,.045);
      --border: rgba(244,247,252,.08);
      --text:   #f4f7fc;
      --sub:    #9aa4b8;
      --dim:    #4a5366;
      --acc:    #f4a440;
      --hdr-h:  52px;
    }

    [data-theme="light"] {
      --bg:     #faf6ee;
      --card:   rgba(28,23,17,.04);
      --border: rgba(28,23,17,.1);
      --text:   #1c1711;
      --sub:    #5c5448;
      --dim:    #9a8f7d;
      --acc:    #c97c1d;
    }

    html, body { height: 100%; }

    body {
      display: flex; flex-direction: column;
      font-family: 'Public Sans', system-ui, sans-serif;
      font-size: 15px; color: var(--text);
      background-color: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    .hdr {
      height: var(--hdr-h); flex-shrink: 0;
      display: flex; align-items: center; gap: 12px;
      padding: 0 20px;
      background: rgba(13,17,23,.85);
      backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--border);
    }
    [data-theme="light"] .hdr {
      background: rgba(250,246,238,.85);
    }

    .back-btn {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 500; color: var(--sub);
      text-decoration: none; padding: 5px 10px; border-radius: 7px;
      border: 1px solid var(--border); background: var(--card);
      transition: all .15s; white-space: nowrap; flex-shrink: 0;
    }
    .back-btn:hover { color: var(--acc); border-color: rgba(244,164,64,.4); background: rgba(244,164,64,.08); }
    .back-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

    .hdr-title {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600; font-size: 15px; color: var(--text);
    }

    .sp { flex: 1; }

    .hdr-hint {
      font-size: 11px; color: var(--dim); white-space: nowrap;
    }

    .hdr-meta {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px; color: var(--dim); white-space: nowrap;
    }

    .save-indicator {
      font-size: 11px; font-family: 'IBM Plex Mono', monospace;
      color: var(--acc); white-space: nowrap;
      opacity: 0; transition: opacity .3s ease;
    }
    .save-indicator.is-visible { opacity: 1; }

    .theme-btn {
      width: 32px; height: 32px; border-radius: 7px;
      border: 1px solid var(--border); background: var(--card);
      color: var(--sub); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s; flex-shrink: 0;
    }
    .theme-btn:hover { color: var(--acc); border-color: rgba(244,164,64,.4); }

    /* ── SCROLL AREA ── */
    .scroll-area {
      flex: 1; overflow-y: auto; display: flex; justify-content: center;
      padding: 48px 24px 120px;
    }
    .scroll-area::-webkit-scrollbar { width: 4px; }
    .scroll-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── EDITOR ── */
    .editor {
      width: 100%; max-width: 720px;
      outline: none;
    }

    /* ── BLOCK: one markdown unit (paragraph / heading / quote / list item / code).
       There is no separate edit mode — the block is always a single
       contenteditable element. Its underlying textContent is always the
       exact raw markdown (markers are real text, just visually hidden via
       CSS while the block isn't focused), so formatting renders live as
       you type and nothing is ever lost or rewritten behind your back. ── */
    .block {
      position: relative;
      border-radius: 6px;
      padding: 5px 10px;
      margin-bottom: 2px;
      line-height: 1.82;
      cursor: text;
      outline: none;
      white-space: pre-wrap;
      word-wrap: break-word;
      transition: background .12s ease;
    }
    .block:hover { background: rgba(244,247,252,.03); }
    [data-theme="light"] .block:hover { background: rgba(28,23,17,.03); }
    .block.is-focused { background: rgba(244,164,64,.05); }

    .block:empty::before {
      content: attr(data-placeholder);
      color: var(--dim);
      font-style: italic;
      pointer-events: none;
    }

    /* Markdown syntax markers — real characters, hidden until you're
       editing that exact block, then shown dim so you can see/edit them. */
    .md-mark { color: var(--dim); }
    .block:not(.is-focused) .md-mark { display: none; }
    .block.is-focused .md-mark { opacity: .55; }
    /* Ordered-list numbers stay visible always — they carry information,
       not just syntax, so hiding them like other markers would be confusing. */
    .block:not(.is-focused) .md-mark.md-mark-visible { display: inline; }

    /* Block-level typography */
    .md-h1 { font-family: 'Space Grotesk', sans-serif; font-size: 28px; font-weight: 700; letter-spacing: -.5px; padding-top: 10px; padding-bottom: 2px; }
    .md-h2 { font-family: 'Space Grotesk', sans-serif; font-size: 21px; font-weight: 600; letter-spacing: -.3px; padding-top: 8px; padding-bottom: 2px; }
    .md-h3 { font-family: 'Space Grotesk', sans-serif; font-size: 17px; font-weight: 600; padding-top: 6px; padding-bottom: 1px; }
    .md-quote { border-left: 3px solid var(--acc); padding-left: 14px; color: var(--sub); font-style: italic; }
    .md-li-ul, .md-li-ol { padding-left: 24px; }
    .md-li-ul::before {
      content: '•'; position: absolute; left: 9px; color: var(--acc);
      opacity: 0; transition: opacity .12s ease;
    }
    .md-li-ul:not(.is-focused)::before { opacity: .85; }
    .md-code {
      font-family: 'IBM Plex Mono', monospace; font-size: 13px;
      background: rgba(244,247,252,.04); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 14px; margin: 2px 0;
    }
    [data-theme="light"] .md-code { background: rgba(28,23,17,.025); }
    .md-code code { color: var(--text); }

    /* Inline styles */
    .block strong { font-weight: 700; }
    .block em { font-style: italic; color: var(--sub); }
    .block del { opacity: .55; text-decoration: line-through; }
    .md-inline-code {
      font-family: 'IBM Plex Mono', monospace; font-size: .92em;
      background: rgba(244,247,252,.08); padding: 1px 5px; border-radius: 4px;
      color: var(--acc);
    }
    [data-theme="light"] .md-inline-code { background: rgba(28,23,17,.06); }
    .md-link { color: var(--acc); text-decoration: underline; }

    /* ── TOOLBAR ── sticky formatting bar. Selecting text and clicking a
       button transforms the selection into that markdown format —
       discoverable formatting that doesn't require knowing the syntax. */
    .toolbar {
      position: sticky; top: var(--hdr-h); z-index: 5;
      display: flex; justify-content: center;
      background: rgba(13,17,23,.85);
      backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--border);
    }
    [data-theme="light"] .toolbar { background: rgba(250,246,238,.85); }
    .toolbar-inner {
      display: flex; align-items: center; gap: 2px; flex-wrap: wrap;
      width: 100%; max-width: 720px; padding: 6px 24px;
    }
    .tb-divider { width: 1px; height: 18px; background: var(--border); margin: 0 6px; flex-shrink: 0; }
    .tb-btn {
      min-width: 28px; height: 26px; padding: 0 7px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid transparent; border-radius: 6px;
      background: transparent; color: var(--sub);
      font-family: 'Public Sans', sans-serif; font-size: 12.5px; font-weight: 500;
      cursor: pointer; transition: all .12s ease; flex-shrink: 0;
    }
    .tb-btn:hover { background: var(--card); color: var(--text); border-color: var(--border); }
    .tb-btn.is-active { background: rgba(244,164,64,.16); color: var(--acc); border-color: rgba(244,164,64,.3); }
    .tb-btn b, .tb-btn i, .tb-btn s { font-family: inherit; }

    /* ── ADD BLOCK ── always-visible affordance, not hover-discovered */
    .add-block-row {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 10px;
      color: var(--dim); font-size: 13px;
      cursor: text; border-radius: 6px;
      transition: color .15s ease, background .15s ease;
      margin-top: 4px;
    }
    .add-block-row:hover { color: var(--sub); background: rgba(244,247,252,.03); }
    [data-theme="light"] .add-block-row:hover { background: rgba(28,23,17,.03); }
    .add-block-row svg { width: 13px; height: 13px; flex-shrink: 0; }
  </style>
</head>
<body>

  <header class="hdr">
    <a class="back-btn" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      PromptPad
    </a>
    <span style="color:var(--border);font-size:14px">|</span>
    <span class="hdr-title">Notes</span>
    <div class="sp"></div>
    <span class="hdr-hint">Type, or select text and use the toolbar above · Enter for a new block</span>
    <span style="color:var(--border);font-size:14px;margin:0 4px">·</span>
    <span class="hdr-meta" id="note-meta">0 words</span>
    <span class="save-indicator" id="save-indicator">saved</span>
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle theme"></button>
  </header>

  <div class="toolbar">
    <div class="toolbar-inner" id="toolbar">
      <button class="tb-btn" data-cmd="bold" title="Bold (Ctrl/Cmd+B)"><b>B</b></button>
      <button class="tb-btn" data-cmd="italic" title="Italic (Ctrl/Cmd+I)"><i>I</i></button>
      <button class="tb-btn" data-cmd="strike" title="Strikethrough"><s>S</s></button>
      <button class="tb-btn" data-cmd="code" title="Inline code">{ }</button>
      <button class="tb-btn" data-cmd="link" title="Link">Link</button>
      <span class="tb-divider"></span>
      <button class="tb-btn" data-cmd="h1" title="Heading 1">H1</button>
      <button class="tb-btn" data-cmd="h2" title="Heading 2">H2</button>
      <button class="tb-btn" data-cmd="h3" title="Heading 3">H3</button>
      <button class="tb-btn" data-cmd="quote" title="Quote">"</button>
      <button class="tb-btn" data-cmd="list" title="Bulleted list">•</button>
    </div>
  </div>

  <div class="scroll-area">
    <div class="editor" id="editor"></div>
  </div>

  <script>
    'use strict';

    const STORAGE_KEY = 'pp-notes';
    const editor = document.getElementById('editor');

    // ── Theme ──
    function getTheme() { return localStorage.getItem('pp-theme') || 'dark'; }
    function applyTheme(t) {
      document.documentElement.dataset.theme = t;
      localStorage.setItem('pp-theme', t);
      const btn = document.getElementById('theme-btn');
      if (!btn) return;
      btn.innerHTML = t === 'dark'
        ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>`
        : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
    }
    function toggleTheme() { applyTheme(getTheme() === 'dark' ? 'light' : 'dark'); }

    // ── Markdown: escape, then wrap markers/content in spans.
    // Markers are kept as real text inside .md-mark spans (hidden via CSS,
    // not removed from the DOM) so block.textContent always equals the
    // original raw markdown — formatting is purely a view, never a rewrite. ──
    // Only & and < need escaping in text-node position — a bare '>' renders
    // fine and leaving it alone keeps blockquote ('> ') marker detection
    // working against the same (escaped) string used for HTML output.
    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;');
    }

    function renderInline(text) {
      const codeTokens = [];
      text = text.replace(/`([^`\n]+)`/g, (m, code) => {
        codeTokens.push(`<span class="md-mark">\`</span><code class="md-inline-code">${code}</code><span class="md-mark">\`</span>`);
        return `${codeTokens.length - 1}`;
      });

      // `url` here is already HTML-escaped (renderInline only ever runs on
      // text that went through escapeHtml once at the top of renderLive) —
      // only quotes need handling for the attribute, not a second escapeHtml pass.
      text = text.replace(/\[([^\]\n]+)\]\(([^()\s]+)\)/g, (m, label, url) =>
        `<span class="md-mark">[</span><a class="md-link" href="${url.replace(/"/g, '&quot;')}" target="_blank" rel="noopener noreferrer">${label}</a><span class="md-mark">](${url})</span>`
      );

      text = text.replace(/(\*\*|__)([^\n]+?)\1/g, (m, mk, inner) =>
        `<span class="md-mark">${mk}</span><strong>${inner}</strong><span class="md-mark">${mk}</span>`
      );

      text = text.replace(/(^|[^*_\w])([*_])([^\s*_][^\n]*?)\2(?![*_\w])/g, (m, pre, mk, inner) =>
        `${pre}<span class="md-mark">${mk}</span><em>${inner}</em><span class="md-mark">${mk}</span>`
      );

      text = text.replace(/~~([^\n]+?)~~/g, (m, inner) =>
        `<span class="md-mark">~~</span><del>${inner}</del><span class="md-mark">~~</span>`
      );

      return text.replace(/(\d+)/g, (m, idx) => codeTokens[Number(idx)]);
    }

    function renderLive(raw) {
      const escaped = escapeHtml(raw);
      const firstLineEnd = escaped.indexOf('\n');
      const firstLine = firstLineEnd === -1 ? escaped : escaped.slice(0, firstLineEnd);

      if (/^```/.test(firstLine)) {
        const lines = escaped.split('\n');
        let closerIdx = -1;
        for (let i = lines.length - 1; i >= 1; i--) {
          if (/^```\s*$/.test(lines[i])) { closerIdx = i; break; }
        }
        const body = (closerIdx === -1 ? lines.slice(1) : lines.slice(1, closerIdx)).join('\n');
        const closer = closerIdx === -1 ? '' : lines[closerIdx];
        const html =
          `<span class="md-mark">${lines[0]}\n</span>` +
          `<code>${body}</code>` +
          (closer ? `<span class="md-mark">\n${closer}</span>` : '');
        return { html, cls: 'md-code' };
      }

      let m;
      if ((m = firstLine.match(/^(#{1,3})[ \t]+/))) {
        return {
          html: `<span class="md-mark">${escaped.slice(0, m[0].length)}</span>${renderInline(escaped.slice(m[0].length))}`,
          cls: 'md-h' + m[1].length,
        };
      }
      if ((m = firstLine.match(/^>[ \t]+/))) {
        return {
          html: `<span class="md-mark">${escaped.slice(0, m[0].length)}</span>${renderInline(escaped.slice(m[0].length))}`,
          cls: 'md-quote',
        };
      }
      if ((m = firstLine.match(/^[-*+][ \t]+/))) {
        return {
          html: `<span class="md-mark">${escaped.slice(0, m[0].length)}</span>${renderInline(escaped.slice(m[0].length))}`,
          cls: 'md-li-ul',
        };
      }
      if ((m = firstLine.match(/^\d+\.[ \t]+/))) {
        return {
          html: `<span class="md-mark md-mark-visible">${escaped.slice(0, m[0].length)}</span>${renderInline(escaped.slice(m[0].length))}`,
          cls: 'md-li-ol',
        };
      }

      return { html: renderInline(escaped), cls: 'md-p' };
    }

    // ── Caret handling — re-render rebuilds the block's DOM on every
    // keystroke, so the caret has to be captured as a plain character
    // offset beforehand and restored to the same offset afterward. ──
    function getCaretOffset(block) {
      const sel = window.getSelection();
      if (!sel.rangeCount) return 0;
      const range = sel.getRangeAt(0);
      if (!block.contains(range.startContainer)) return 0;
      const pre = range.cloneRange();
      pre.selectNodeContents(block);
      pre.setEnd(range.startContainer, range.startOffset);
      return pre.toString().length;
    }

    // Locates the text node + inner offset for a character offset within a
    // block. Returns null past the end (caller falls back to block end).
    function locateOffset(block, offset) {
      const walker = document.createTreeWalker(block, NodeFilter.SHOW_TEXT, null);
      let node, count = 0;
      while ((node = walker.nextNode())) {
        const len = node.textContent.length;
        if (count + len >= offset) return { node, inner: Math.max(0, offset - count) };
        count += len;
      }
      return null;
    }

    // Sets the selection to a character range within a block (start===end
    // for a plain caret). Used both for caret restoration after a re-render
    // and for re-selecting text the toolbar just transformed.
    function setSelectionOffsets(block, start, end = start) {
      const range = document.createRange();
      const startLoc = locateOffset(block, start);
      const endLoc = locateOffset(block, end);
      if (startLoc) range.setStart(startLoc.node, startLoc.inner);
      else range.selectNodeContents(block), range.collapse(false);
      if (endLoc) range.setEnd(endLoc.node, endLoc.inner);
      else range.collapse(true);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    }

    function focusBlock(block, offset) {
      block.focus();
      setSelectionOffsets(block, offset);
    }

    // ── Toolbar — reads the live selection (valid because toolbar buttons
    // use mousedown+preventDefault, so clicking one never steals focus or
    // collapses the selection inside the block). ──
    function getActiveSelection() {
      const sel = window.getSelection();
      if (!sel.rangeCount) return null;
      const range = sel.getRangeAt(0);
      const closestBlock = node => (node.nodeType === 1 ? node : node.parentElement)?.closest('.block');
      const startBlock = closestBlock(range.startContainer);
      const endBlock = closestBlock(range.endContainer);
      if (!startBlock || startBlock !== endBlock) return null;

      const startRange = range.cloneRange();
      startRange.selectNodeContents(startBlock);
      startRange.setEnd(range.startContainer, range.startOffset);
      const endRange = range.cloneRange();
      endRange.selectNodeContents(startBlock);
      endRange.setEnd(range.endContainer, range.endOffset);

      const a = startRange.toString().length;
      const b = endRange.toString().length;
      return { block: startBlock, start: Math.min(a, b), end: Math.max(a, b) };
    }

    const WRAP_MARKERS = { bold: '**', italic: '*', strike: '~~', code: '`' };
    const LINE_PREFIX = { h1: '# ', h2: '## ', h3: '### ', quote: '> ', list: '- ' };

    function markerKind(marker) {
      const m = marker.trim();
      if (/^#{1,3}$/.test(m)) return 'h' + m.length;
      if (m === '>') return 'quote';
      if (/^[-*+]$/.test(m)) return 'list';
      return null;
    }

    function toggleWrap({ block, start, end }, marker) {
      const raw = block.textContent;
      const mlen = marker.length;
      const before = raw.slice(Math.max(0, start - mlen), start);
      const after = raw.slice(end, end + mlen);

      let newRaw, newStart, newEnd;
      if (before === marker && after === marker) {
        newRaw = raw.slice(0, start - mlen) + raw.slice(start, end) + raw.slice(end + mlen);
        newStart = start - mlen;
        newEnd = end - mlen;
      } else if (start === end) {
        newRaw = raw.slice(0, start) + marker + marker + raw.slice(start);
        newStart = newEnd = start + mlen;
      } else {
        newRaw = raw.slice(0, start) + marker + raw.slice(start, end) + marker + raw.slice(end);
        newStart = start + mlen;
        newEnd = end + mlen;
      }
      renderBlock(block, newRaw);
      focusBlock(block, newStart);
      setSelectionOffsets(block, newStart, newEnd);
      saveAll();
      updateMeta();
    }

    function toggleLink({ block, start, end }) {
      if (start === end) { flashHint('Select some text first, then click Link'); return; }
      const url = prompt('Link URL:', 'https://');
      if (!url) return;
      const raw = block.textContent;
      const insertion = `[${raw.slice(start, end)}](${url})`;
      renderBlock(block, raw.slice(0, start) + insertion + raw.slice(end));
      focusBlock(block, start + insertion.length);
      saveAll();
      updateMeta();
    }

    function toggleLinePrefix({ block, start }, cmd) {
      const marker = LINE_PREFIX[cmd];
      const raw = block.textContent;
      const firstLineEnd = raw.indexOf('\n');
      const firstLine = firstLineEnd === -1 ? raw : raw.slice(0, firstLineEnd);
      const rest = firstLineEnd === -1 ? '' : raw.slice(firstLineEnd);

      const existing = firstLine.match(/^(#{1,3}[ \t]+|>[ \t]+|[-*+][ \t]+)/);
      const existingMarker = existing ? existing[0] : '';
      const isSameKind = markerKind(existingMarker) === cmd;

      const newFirstLine = isSameKind
        ? firstLine.slice(existingMarker.length)
        : marker + firstLine.slice(existingMarker.length);
      const caretShift = newFirstLine.length - firstLine.length;

      renderBlock(block, newFirstLine + rest);
      focusBlock(block, Math.max(0, start + caretShift));
      saveAll();
      updateMeta();
    }

    function applyFormat(cmd) {
      const selInfo = getActiveSelection();
      if (!selInfo) { flashHint('Click into a note first'); return; }
      if (cmd in WRAP_MARKERS) return toggleWrap(selInfo, WRAP_MARKERS[cmd]);
      if (cmd === 'link') return toggleLink(selInfo);
      if (cmd in LINE_PREFIX) return toggleLinePrefix(selInfo, cmd);
    }

    function flashHint(message) {
      const hint = document.querySelector('.hdr-hint');
      const original = hint.textContent;
      hint.textContent = message;
      hint.style.color = 'var(--acc)';
      setTimeout(() => { hint.textContent = original; hint.style.color = ''; }, 1800);
    }

    function updateToolbarState() {
      const buttons = document.querySelectorAll('#toolbar .tb-btn');
      const selInfo = getActiveSelection();
      if (!selInfo) { buttons.forEach(b => b.classList.remove('is-active')); return; }

      const sel = window.getSelection();
      const anchor = sel.anchorNode && (sel.anchorNode.nodeType === 1 ? sel.anchorNode : sel.anchorNode.parentElement);
      const inlineActive = {
        bold: !!anchor?.closest('strong'),
        italic: !!anchor?.closest('em'),
        strike: !!anchor?.closest('del'),
        code: !!anchor?.closest('.md-inline-code'),
      };
      const blockKind = { 'md-h1': 'h1', 'md-h2': 'h2', 'md-h3': 'h3', 'md-quote': 'quote', 'md-li-ul': 'list' };
      const activeBlockCmd = Object.entries(blockKind).find(([cls]) => selInfo.block.classList.contains(cls))?.[1];

      buttons.forEach(btn => {
        const cmd = btn.dataset.cmd;
        btn.classList.toggle('is-active', inlineActive[cmd] === true || cmd === activeBlockCmd);
      });
    }

    document.querySelectorAll('#toolbar .tb-btn').forEach(btn => {
      btn.addEventListener('mousedown', e => {
        e.preventDefault(); // keep the contenteditable block focused; selection survives
        applyFormat(btn.dataset.cmd);
        updateToolbarState();
      });
    });
    document.addEventListener('selectionchange', updateToolbarState);

    // ── Block lifecycle ──
    function renderBlock(block, raw) {
      const { html, cls } = renderLive(raw);
      block.innerHTML = html;
      block.classList.remove('md-h1', 'md-h2', 'md-h3', 'md-quote', 'md-li-ul', 'md-li-ol', 'md-code', 'md-p');
      block.classList.add(cls);
    }

    function createBlock(raw) {
      const block = document.createElement('div');
      block.className = 'block';
      block.contentEditable = 'true';
      block.setAttribute('role', 'textbox');
      block.setAttribute('aria-multiline', 'true');
      block.dataset.placeholder = 'Write something — select text and use the toolbar above to format it';
      renderBlock(block, raw);
      wireBlock(block);
      return block;
    }

    function wireBlock(block) {
      let isComposing = false;
      block.addEventListener('compositionstart', () => { isComposing = true; });
      block.addEventListener('compositionend', () => {
        isComposing = false;
        block.dispatchEvent(new Event('input'));
      });

      block.addEventListener('input', () => {
        if (isComposing) return;
        const offset = getCaretOffset(block);
        renderBlock(block, block.textContent);
        setSelectionOffsets(block, offset);
        saveAll();
        updateMeta();
      });

      block.addEventListener('focus', () => block.classList.add('is-focused'));
      block.addEventListener('blur', () => block.classList.remove('is-focused'));

      block.addEventListener('keydown', e => {
        const modKey = e.metaKey || e.ctrlKey;
        if (modKey && e.key.toLowerCase() === 'b') { e.preventDefault(); applyFormat('bold'); return; }
        if (modKey && e.key.toLowerCase() === 'i') { e.preventDefault(); applyFormat('italic'); return; }

        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          const offset = getCaretOffset(block);
          const raw = block.textContent;
          renderBlock(block, raw.slice(0, offset));
          const next = createBlock(raw.slice(offset));
          block.after(next);
          focusBlock(next, 0);
          saveAll();
          updateMeta();
          return;
        }

        if (e.key === 'Enter' && e.shiftKey) {
          e.preventDefault();
          const offset = getCaretOffset(block);
          const raw = block.textContent;
          renderBlock(block, raw.slice(0, offset) + '\n' + raw.slice(offset));
          setSelectionOffsets(block, offset + 1);
          saveAll();
          updateMeta();
          return;
        }

        if (e.key === 'Backspace') {
          const sel = window.getSelection();
          const collapsed = sel.rangeCount && sel.getRangeAt(0).collapsed;
          if (collapsed && getCaretOffset(block) === 0) {
            const prev = block.previousElementSibling;
            if (prev && prev.classList.contains('block')) {
              e.preventDefault();
              const mergeOffset = prev.textContent.length;
              const merged = prev.textContent + block.textContent;
              block.remove();
              renderBlock(prev, merged);
              focusBlock(prev, mergeOffset);
              saveAll();
              updateMeta();
            }
          }
          return;
        }

        if (e.key === 'Escape') { block.blur(); return; }

        if (e.key === 'ArrowUp') {
          const offset = getCaretOffset(block);
          if (!block.textContent.slice(0, offset).includes('\n')) {
            const prev = block.previousElementSibling;
            if (prev && prev.classList.contains('block')) {
              e.preventDefault();
              focusBlock(prev, prev.textContent.length);
            }
          }
          return;
        }

        if (e.key === 'ArrowDown') {
          const offset = getCaretOffset(block);
          if (!block.textContent.slice(offset).includes('\n')) {
            const next = block.nextElementSibling;
            if (next && next.classList.contains('block')) {
              e.preventDefault();
              focusBlock(next, Math.min(offset, next.textContent.length));
            }
          }
        }
      });
    }

    // ── Meta + persistence ──
    function getAllRaw() {
      return Array.from(editor.querySelectorAll('.block')).map(b => b.textContent).join('\n\n');
    }

    function updateMeta() {
      const all = getAllRaw().trim();
      const words = all ? all.split(/\s+/).length : 0;
      document.getElementById('note-meta').textContent = words.toLocaleString() + ' word' + (words !== 1 ? 's' : '');
    }

    let saveFlashTimer;
    function saveAll() {
      localStorage.setItem(STORAGE_KEY, getAllRaw());
      const indicator = document.getElementById('save-indicator');
      indicator.classList.add('is-visible');
      clearTimeout(saveFlashTimer);
      saveFlashTimer = setTimeout(() => indicator.classList.remove('is-visible'), 900);
    }

    // ── Split stored content into blocks on load ──
    function splitBlocks(markdown) {
      if (!markdown) return [''];
      const blocks = [];
      const lines = markdown.split('\n');
      let cur = '', inFence = false;

      for (const line of lines) {
        if (/^```/.test(line)) inFence = !inFence;
        if (!inFence && line === '' && cur.trim()) {
          blocks.push(cur.trim());
          cur = '';
        } else {
          cur += (cur ? '\n' : '') + line;
        }
      }
      if (cur.trim()) blocks.push(cur.trim());
      if (!blocks.length || blocks[blocks.length - 1].trim() !== '') blocks.push('');
      return blocks;
    }

    // ── Init ──
    applyTheme(getTheme());

    const saved = localStorage.getItem(STORAGE_KEY) || '';
    splitBlocks(saved).forEach(raw => editor.appendChild(createBlock(raw)));

    const addRow = document.createElement('div');
    addRow.className = 'add-block-row';
    addRow.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add a block';
    addRow.addEventListener('click', () => {
      const blocks = editor.querySelectorAll('.block');
      const last = blocks[blocks.length - 1];
      if (last && last.textContent.trim() === '') { focusBlock(last, 0); return; }
      const next = createBlock('');
      editor.insertBefore(next, addRow);
      focusBlock(next, 0);
    });
    editor.appendChild(addRow);

    updateMeta();
  </script>
</body>
</html>
