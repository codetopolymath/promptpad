<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PromptPad v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D1117;--surface:#13161E;--card:#181C27;--border:#21283A;
  --border-f:#6D5BE6;--acc:#A78BFA;--acc-dim:rgba(167,139,250,.11);
  --acc2:#34D399;--acc3:#F7C948;--acc4:#F87171;
  --text:#C9D1E8;--sub:#7B8DB0;--dim:#374360;--wm:#171C29;
  --r:8px;--r2:14px;
  --fd:'Space Grotesk',sans-serif;--fe:'JetBrains Mono',monospace;--fu:'Inter',sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--fu);min-height:100vh;overflow-x:hidden}

/* ── HEADER ── */
.hdr{position:fixed;top:0;left:0;right:0;z-index:200;height:54px;display:flex;align-items:center;gap:12px;padding:0 18px;background:rgba(13,17,23,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
.logo{font-family:var(--fd);font-weight:800;font-size:16px;letter-spacing:-.5px;color:var(--text);display:flex;align-items:center;gap:8px;flex-shrink:0}
.logo-gem{width:20px;height:20px;background:var(--acc);border-radius:5px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 10px rgba(167,139,250,.3)}
.logo-gem svg{width:11px;height:11px;fill:white}
.ver{font-size:10px;background:var(--border);color:var(--sub);padding:2px 6px;border-radius:4px;font-family:var(--fe);font-weight:400}

/* Framework selector */
.fw-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0}
.fw-lbl{font-size:11px;color:var(--sub);white-space:nowrap}
.fw-sel{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--fu);font-size:12px;font-weight:500;padding:4px 10px;border-radius:var(--r);cursor:pointer;outline:none;transition:border-color .15s}
.fw-sel:focus{border-color:var(--acc)}
.fw-sel option{background:#1a1d2a}

/* Mode tabs */
.seg{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:3px;gap:2px}
.seg-btn{padding:4px 12px;font-size:12px;font-weight:500;font-family:var(--fu);border:none;border-radius:6px;cursor:pointer;color:var(--sub);background:transparent;transition:all .15s;white-space:nowrap}
.seg-btn.on{background:var(--acc);color:#fff;box-shadow:0 1px 6px rgba(167,139,250,.3)}
.sp{flex:1}
.hdr-acts{display:flex;align-items:center;gap:5px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:var(--r);font-family:var(--fu);font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--sub);transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--acc);color:var(--acc);background:var(--acc-dim)}
.btn.primary{background:var(--acc);border-color:var(--acc);color:#fff}
.btn.primary:hover{background:#9B7AF0;box-shadow:0 0 12px rgba(167,139,250,.35)}
.btn svg{flex-shrink:0;width:13px;height:13px}

/* ── SIDEBAR ── */
.sb{width:210px;flex-shrink:0;position:fixed;top:54px;left:0;bottom:0;background:var(--surface);border-right:1px solid var(--border);padding:16px 0;overflow-y:auto;display:flex;flex-direction:column}
.sb-lbl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);padding:0 14px 8px}
.ni{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;font-size:12.5px;color:var(--sub);border-left:2px solid transparent;transition:all .1s}
.ni:hover{background:var(--card);color:var(--text)}
.ni.lit{border-left-color:var(--acc);background:var(--acc-dim);color:var(--acc)}
.ni.off{opacity:.35}
.ni-n{font-size:10px;font-family:var(--fe);color:var(--dim);min-width:16px;flex-shrink:0}
.ni-dot{margin-left:auto;width:5px;height:5px;border-radius:50%;background:var(--acc2);flex-shrink:0;opacity:0;transition:opacity .2s}
.ni.has-content .ni-dot{opacity:1}
.sb-div{border-top:1px solid var(--border);margin:12px 0}
.sb-section{padding:0 14px}
.sb-inject-title{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:8px}
.inject-pill{display:flex;align-items:center;gap:6px;padding:6px 8px;background:var(--card);border:1px solid var(--border);border-radius:6px;font-size:11px;color:var(--sub);cursor:pointer;margin-bottom:5px;transition:all .15s}
.inject-pill:hover{border-color:var(--acc);color:var(--acc);background:var(--acc-dim)}
.inject-pill svg{width:12px;height:12px;flex-shrink:0}
.sb-foot{margin-top:auto;padding:12px 14px;border-top:1px solid var(--border)}
.sb-hint{font-size:11px;color:var(--dim);line-height:1.5}
.kbd{display:inline-flex;align-items:center;font-size:10px;font-family:var(--fe);color:var(--dim);border:1px solid var(--border);border-radius:3px;padding:1px 4px}

/* ── LAYOUT ── */
.shell{display:flex;padding-top:54px;min-height:100vh}
.main{margin-left:210px;flex:1;padding:32px 40px 80px;max-width:860px}

/* ── SECTION CARDS ── */
.sc{position:relative;margin-bottom:18px;border:1px solid var(--border);border-radius:var(--r2);background:var(--card);overflow:visible;transition:border-color .2s,box-shadow .2s}
.sc:focus-within{border-color:var(--border-f);box-shadow:0 0 0 1px rgba(109,91,230,.15),0 6px 24px rgba(0,0,0,.3)}
.sc.off{opacity:.4;pointer-events:none}
.sc-hdr{display:flex;align-items:center;gap:8px;padding:13px 16px 0}
.sc-fw-badge{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-family:var(--fe);color:var(--acc3);background:rgba(247,201,72,.1);padding:2px 6px;border-radius:3px;display:none}
.sc-tag{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;font-family:var(--fe);color:var(--acc);background:var(--acc-dim);padding:2px 8px;border-radius:4px;flex-shrink:0}
.sc-ttl{font-family:var(--fd);font-size:14px;font-weight:600;color:var(--text);flex:1}
.sc-acts{display:flex;align-items:center;gap:2px;position:relative}
.ic{display:inline-flex;align-items:center;justify-content:center;width:27px;height:27px;border-radius:6px;border:none;cursor:pointer;background:transparent;color:var(--sub);font-size:13px;transition:all .15s;flex-shrink:0}
.ic:hover{background:var(--border);color:var(--text)}
.ic.info:hover{color:var(--acc3)}
.ic.cp:hover{color:var(--acc2)}
.ic.snip:hover{color:var(--acc)}
.tgl{width:28px;height:16px;border-radius:8px;background:var(--border);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.tgl.on{background:var(--acc)}
.tgl-th{position:absolute;top:2px;left:2px;width:12px;height:12px;background:#fff;border-radius:50%;transition:left .2s}
.tgl.on .tgl-th{left:14px}

/* snippet dropdown */
.snip-drop{position:absolute;right:0;top:32px;width:280px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:8px;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,.5);display:none}
.snip-drop.open{display:block}
.snip-hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.snip-title{font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.08em}
.snip-item{display:flex;align-items:flex-start;gap:8px;padding:7px 8px;border-radius:6px;cursor:pointer;border:1px solid transparent;margin-bottom:4px;transition:all .1s}
.snip-item:hover{background:var(--card);border-color:var(--border)}
.snip-text{font-size:11.5px;color:var(--text);line-height:1.5;font-family:var(--fe);flex:1;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.snip-use{font-size:10px;font-weight:600;color:var(--acc);white-space:nowrap;padding:2px 6px;border:1px solid var(--acc-dim);border-radius:4px;flex-shrink:0;background:var(--acc-dim)}
.snip-save{width:100%;margin-top:4px;padding:7px;background:transparent;border:1px dashed var(--border);border-radius:6px;font-size:11px;color:var(--sub);cursor:pointer;text-align:center;font-family:var(--fu);transition:all .15s}
.snip-save:hover{border-color:var(--acc);color:var(--acc)}

/* editor */
.ew{position:relative;padding:10px 16px 6px}
.wm{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:clamp(28px,5.5vw,62px);font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--wm);pointer-events:none;user-select:none;transition:opacity .25s;z-index:0;overflow:hidden}
.wm.gone{opacity:0}
.ta{width:100%;background:transparent;border:none;outline:none;resize:none;font-family:var(--fe);font-size:13.5px;line-height:1.75;color:var(--text);min-height:100px;position:relative;z-index:1;caret-color:var(--acc)}
.ta::placeholder{color:var(--dim);font-style:italic;font-size:13px}
.cc{font-size:11px;color:var(--dim);font-family:var(--fe);text-align:right;padding:0 16px 10px}
.tip-panel{display:none;border-top:1px solid var(--border);padding:12px 16px;font-size:13px;color:var(--sub);line-height:1.65;background:var(--surface)}
.tip-panel.show{display:block}
.tip-h{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--acc3);margin-bottom:5px}
.tip-ex{margin-top:8px;padding:9px 12px;background:var(--card);border-radius:var(--r);border-left:3px solid var(--acc);font-family:var(--fe);font-size:11.5px;color:var(--text);white-space:pre-wrap;line-height:1.7}

/* fw info banner */
.fw-banner{margin-bottom:20px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);display:flex;align-items:flex-start;gap:12px}
.fw-banner-icon{font-size:20px;flex-shrink:0}
.fw-banner-name{font-family:var(--fd);font-weight:700;font-size:15px;color:var(--text);margin-bottom:3px}
.fw-banner-desc{font-size:12.5px;color:var(--sub);line-height:1.5}
.fw-banner-letters{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.fw-letter{font-size:10px;font-weight:600;font-family:var(--fe);padding:3px 8px;border-radius:4px;letter-spacing:.05em}

/* page title */
.pg-ttl{margin-bottom:24px}
.pg-ttl h1{font-family:var(--fd);font-weight:700;font-size:20px;letter-spacing:-.5px;margin-bottom:4px}
.pg-ttl p{font-size:12.5px;color:var(--sub);line-height:1.6}

/* ── PANELS ── */
.pnl{display:none;margin-left:210px;padding:32px 40px 80px;max-width:860px}

/* Preview */
.pv-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:28px}
.pv-hdr{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--sub);margin-bottom:20px;display:flex;align-items:center;gap:8px}
.pv-sec{margin-bottom:20px}
.pv-lbl{font-family:var(--fe);font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--acc);margin-bottom:6px}
.pv-body{font-size:14px;line-height:1.75;color:var(--text)}
.pv-body p{margin-bottom:10px}
.pv-body h1,.pv-body h2,.pv-body h3{font-family:var(--fd);margin:12px 0 6px;font-weight:600}
.pv-body code{background:var(--surface);padding:2px 6px;border-radius:4px;font-family:var(--fe);font-size:12px;color:var(--acc2)}
.pv-body pre{background:var(--surface);padding:12px 16px;border-radius:var(--r);overflow-x:auto;margin:8px 0}
.pv-body pre code{background:transparent;padding:0}
.pv-body ul,.pv-body ol{padding-left:20px;margin-bottom:10px}
.pv-div{border:none;border-top:1px solid var(--border);margin:16px 0}

/* Assemble */
.as-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.as-ttl{font-family:var(--fd);font-weight:700;font-size:16px}
.as-body{font-family:var(--fe);font-size:13px;line-height:1.85;color:var(--text);white-space:pre-wrap;padding:20px;background:var(--surface);border-radius:var(--r);border:1px solid var(--border);max-height:500px;overflow-y:auto}
.as-meta{margin-top:12px;font-size:12px;color:var(--sub);display:flex;gap:18px;flex-wrap:wrap}
.as-meta strong{color:var(--text)}

/* ── GUIDE TAB ── */
.guide-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:32px}
@media(max-width:900px){.guide-grid{grid-template-columns:1fr}}
.g-section-title{font-family:var(--fd);font-weight:700;font-size:17px;margin-bottom:4px;color:var(--text)}
.g-section-desc{font-size:12.5px;color:var(--sub);margin-bottom:16px;line-height:1.5}

/* Framework cards */
.fw-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:16px;cursor:pointer;transition:all .15s;position:relative}
.fw-card:hover{border-color:var(--border-f);background:var(--card)}
.fw-card.active-fw{border-color:var(--acc);box-shadow:0 0 0 1px rgba(167,139,250,.2)}
.fw-card-name{font-family:var(--fd);font-weight:700;font-size:14px;color:var(--text);margin-bottom:3px;display:flex;align-items:center;gap:8px}
.fw-card-badge{font-size:10px;font-family:var(--fe);color:var(--sub);background:var(--surface);padding:2px 7px;border-radius:4px;font-weight:400}
.fw-card-when{font-size:12px;color:var(--sub);line-height:1.5;margin-bottom:10px}
.fw-letters{display:flex;flex-wrap:wrap;gap:3px;margin-top:8px}
.fw-l{font-size:9.5px;font-weight:600;font-family:var(--fe);padding:2px 7px;border-radius:3px;letter-spacing:.04em;border:1px solid}

/* Decision table */
.dec-table{width:100%;border-collapse:collapse;font-size:12.5px;margin-bottom:8px}
.dec-table th{text-align:left;padding:8px 12px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--sub);border-bottom:1px solid var(--border)}
.dec-table td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:top;line-height:1.5}
.dec-table tr:last-child td{border-bottom:none}
.dec-table tr:hover td{background:var(--card)}
.tag-pill{display:inline-flex;font-size:10px;font-weight:600;font-family:var(--fe);padding:2px 7px;border-radius:4px;letter-spacing:.04em}

/* Technique cards */
.tech-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:900px){.tech-grid{grid-template-columns:1fr}}
.tech-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:14px}
.tech-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
.tech-name{font-family:var(--fd);font-weight:600;font-size:13.5px;color:var(--text)}
.tech-cat{font-size:9.5px;font-weight:700;font-family:var(--fe);padding:2px 7px;border-radius:4px;letter-spacing:.05em;flex-shrink:0;margin-top:1px}
.cat-reason{background:rgba(167,139,250,.12);color:#A78BFA}
.cat-retrieve{background:rgba(52,211,153,.1);color:#34D399}
.cat-agentic{background:rgba(247,201,72,.1);color:#F7C948}
.cat-optim{background:rgba(248,113,113,.1);color:#F87171}
.cat-context{background:rgba(96,165,250,.1);color:#60A5FA}
.tech-desc{font-size:12.5px;color:var(--sub);line-height:1.5;margin-bottom:10px}
.tech-when{font-size:11.5px;color:var(--dim);margin-bottom:8px}
.tech-when span{color:var(--text-dim)}
.tech-snippet{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:8px 10px;font-family:var(--fe);font-size:11.5px;color:var(--text);line-height:1.6;white-space:pre-wrap;margin-bottom:8px}
.tech-actions{display:flex;gap:6px}
.tech-btn{font-size:11px;font-weight:500;padding:4px 10px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--sub);cursor:pointer;font-family:var(--fu);transition:all .15s}
.tech-btn:hover{border-color:var(--acc);color:var(--acc);background:var(--acc-dim)}
.tech-btn.inject{border-color:var(--acc-dim);color:var(--acc);background:var(--acc-dim)}
.tech-btn.inject:hover{background:var(--acc);color:#fff}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;z-index:999;background:var(--card);border:1px solid var(--acc2);color:var(--text);padding:8px 14px;border-radius:var(--r);font-size:13px;font-weight:500;display:flex;align-items:center;gap:7px;box-shadow:0 6px 24px rgba(0,0,0,.5);transform:translateY(16px);opacity:0;transition:all .25s;pointer-events:none}
.toast.up{transform:translateY(0);opacity:1}

/* Flash */
@keyframes flash-in{0%{background:rgba(167,139,250,.08)}100%{background:var(--card)}}
.flashed{animation:flash-in .4s ease}

/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

@media(max-width:720px){
  .sb,.fw-lbl,.fw-wrap .fw-lbl{display:none}
  .main,.pnl{margin-left:0;padding:24px 16px 60px}
  .guide-grid,.tech-grid{grid-template-columns:1fr}
  .hdr-acts .btn:not(.primary){display:none}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="logo">
    <div class="logo-gem"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
    PromptPad
    <span class="ver">v2</span>
  </div>
  <div class="fw-wrap">
    <span class="fw-lbl">Framework</span>
    <select class="fw-sel" id="fw-sel" onchange="changeFw(this.value)">
      <option value="custom">Custom (Full 8)</option>
      <option value="risen">RISEN</option>
      <option value="costar">CO-STAR</option>
      <option value="rtf">RTF (Minimal)</option>
      <option value="tag">TAG (Micro)</option>
      <option value="crispe">CRISPE</option>
      <option value="ape">APE</option>
    </select>
  </div>
  <div class="seg">
    <button class="seg-btn on" id="m-write" onclick="mode('write')">Write</button>
    <button class="seg-btn" id="m-preview" onclick="mode('preview')">Preview</button>
    <button class="seg-btn" id="m-assemble" onclick="mode('assemble')">Assemble</button>
    <button class="seg-btn" id="m-guide" onclick="mode('guide')">Guide</button>
  </div>
  <div class="sp"></div>
  <div class="hdr-acts">
    <button class="btn" onclick="doLoad()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>Load</button>
    <button class="btn" onclick="doExport()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Export</button>
    <button class="btn" onclick="doClear()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>Clear</button>
    <button class="btn primary" onclick="copyFull()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>Copy Prompt</button>
  </div>
</header>

<!-- SIDEBAR -->
<aside class="sb" id="sb"></aside>

<!-- WRITE PANEL -->
<main class="main" id="p-write">
  <div class="pg-ttl"><h1>Structure your thinking.</h1><p>Select a framework above, fill in the sections, click <strong style="color:var(--acc3)">ⓘ</strong> to learn each section. Open the <strong style="color:var(--acc)">Guide</strong> tab to compare frameworks and add advanced techniques. Auto-saved.</p></div>
  <div id="fw-banner"></div>
  <div id="cards"></div>
</main>

<!-- PREVIEW PANEL -->
<div class="pnl" id="p-preview" style="padding-top:32px">
  <div class="pv-card" id="pv-out"></div>
</div>

<!-- ASSEMBLE PANEL -->
<div class="pnl" id="p-assemble" style="padding-top:32px">

// ════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════
const ST = {
  fw:'custom',
  mode:'write',
  vals:{},
  on:{},
  tips:{},
  snips:{},
  openSnip:null
};

// init state for all base sections
Object.keys(SEC_DEFS).forEach(id=>{
  ST.vals[id]=''; ST.on[id]=true; ST.tips[id]=false;
});
// extra state for tone2 (CO-STAR duplicate)
ST.vals['tone2']=''; ST.on['tone2']=true; ST.tips['tone2']=false;

function loadST(){
  try{
    const d=JSON.parse(localStorage.getItem('pp3')||'{}');
    if(d.vals)Object.assign(ST.vals,d.vals);
    if(d.on)Object.assign(ST.on,d.on);
    if(d.fw)ST.fw=d.fw;
    if(d.snips)ST.snips=d.snips;
  }catch(e){}
}
function saveST(){localStorage.setItem('pp3',JSON.stringify({vals:ST.vals,on:ST.on,fw:ST.fw,snips:ST.snips}))}

// ════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════
function currentFW(){return FW[ST.fw]}
function currentSections(){
  const fw=currentFW();
  return fw.sections.map((s,i)=>{
    const base=SEC_DEFS[s.base];
    const ov=s.overrides||{};
    const secId=ov.id||s.base;
    return {
      idx:i,baseId:s.base,secId,
      tag:ov.tag||base.tag,
      title:ov.title||base.title,
      wm:(ov.title||base.title).split('/')[0].trim().toUpperCase().substring(0,10),
      ph:ov.ph||base.ph,
      tip:base.tip
    };
  });
}
function getVal(sec){return ST.vals[sec.secId]!==undefined?ST.vals[sec.secId]:ST.vals[sec.baseId]||''}
function setVal(sec,v){ST.vals[sec.secId]=v; ST.vals[sec.baseId]=v}
function activeSecs(){return currentSections().filter(s=>ST.on[s.secId]&&getVal(s).trim())}
function assembleText(){
  const a=activeSecs();
  return a.map(s=>`## ${s.title}\n\n${getVal(s)}`).join('\n\n---\n\n');
}
function escH(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ════════════════════════════════════════════════
//  BUILD SIDEBAR
// ════════════════════════════════════════════════
function buildSb(){
  const secs=currentSections();
  const navHtml=secs.map((s,i)=>`
    <div class="ni${ST.on[s.secId]?'':' off'}${getVal(s).trim()?' has-content':''}" id="n-${s.secId}-${i}" onclick="scrollToSec('${s.secId}-${i}')">
      <span class="ni-n">${String(i+1).padStart(2,'0')}</span>
      <span>${s.title}</span>
      <span class="ni-dot"></span>
    </div>
  `).join('');

  const injectHtml=TECHNIQUES.slice(0,4).map(t=>`
    <div class="inject-pill" onclick="injectTech('${t.injectTo}','${escH(t.snippet).replace(/'/g,"&#39;")}','${escH(t.name)}')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
      ${t.name}
    </div>
  `).join('');

  document.getElementById('sb').innerHTML=`
    <div class="sb-lbl">Sections — ${currentFW().name}</div>
    ${navHtml}
    <div class="sb-div"></div>
    <div class="sb-section">
      <div class="sb-inject-title">Quick Inject</div>
      ${injectHtml}
      <div class="inject-pill" onclick="mode('guide')" style="margin-top:4px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        All Techniques →
      </div>
    </div>
    <div class="sb-foot">
      <div class="sb-hint">Click <strong style="color:var(--acc3)">ⓘ</strong> to learn. Click <strong style="color:var(--acc)">📚</strong> for snippets.</div>
      <div style="display:flex;align-items:center;gap:4px;margin-top:8px">
        <span class="kbd">⌘</span><span class="kbd">↵</span>
        <span style="font-size:11px;color:var(--dim);margin-left:2px">copy prompt</span>
      </div>
    </div>
  `;
}

// ════════════════════════════════════════════════
//  BUILD CARDS
// ════════════════════════════════════════════════
function buildFwBanner(){
  const fw=currentFW();
  if(ST.fw==='custom'){document.getElementById('fw-banner').innerHTML='';return}
  const lettersHtml=fw.letters.map(l=>`<span class="fw-l" style="color:${l.c};border-color:${l.c}22;background:${l.c}11">${l.l}</span>`).join('');
  document.getElementById('fw-banner').innerHTML=`
    <div class="fw-banner">
      <div class="fw-banner-icon">${fw.icon}</div>
      <div>
        <div class="fw-banner-name">${fw.name}</div>
        <div class="fw-banner-desc">${fw.desc}</div>
        <div class="fw-banner-letters">${lettersHtml}</div>
      </div>
    </div>
  `;
}

function buildCards(){
  const secs=currentSections();
  document.getElementById('cards').innerHTML=secs.map((s,i)=>{
    const val=getVal(s);
    const uid=`${s.secId}-${i}`;
    // Snippets for this section
    const baseSnips=DEFAULT_SNIPS[s.baseId]||[];
    const userSnips=ST.snips[s.secId]||[];
    const allSnips=[...baseSnips,...userSnips];
    const snipItems=allSnips.map((t,si)=>`
      <div class="snip-item" onclick="useSnip('${uid}','${si}')">
        <div class="snip-text">${escH(t)}</div>
        <div class="snip-use">Use</div>
      </div>
    `).join('');

    return `
    <div class="sc${ST.on[s.secId]?'':' off'}" id="c-${uid}">
      <div class="sc-hdr">
        <span class="sc-tag">${s.tag}</span>
        <span class="sc-ttl">${s.title}</span>
        <div class="sc-acts">
          <button class="ic info" title="Learn about this section" onclick="flipTip('${uid}')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
          </button>
          <button class="ic snip" title="Snippets for this section" onclick="toggleSnip(event,'${uid}')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
          </button>
          <button class="ic cp" title="Copy section" onclick="copySec('${uid}','${s.secId}')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          </button>
          <div class="tgl${ST.on[s.secId]?' on':''}" id="tgl-${uid}" onclick="flipOn('${s.secId}','${uid}')" title="Toggle"><div class="tgl-th"></div></div>
          <!-- snippet dropdown -->
          <div class="snip-drop" id="sd-${uid}">
            <div class="snip-hdr-row">
              <span class="snip-title">Snippets for ${s.title}</span>
              <span style="font-size:11px;color:var(--dim)">${allSnips.length} available</span>
            </div>
            ${snipItems.length?snipItems:'<p style="font-size:12px;color:var(--dim);padding:4px 0">No snippets yet.</p>'}
            <button class="snip-save" onclick="saveSnip('${uid}','${s.secId}')">+ Save current text as snippet</button>
          </div>
        </div>
      </div>
      <div class="ew">
        <div class="wm${val?' gone':''}" id="wm-${uid}">${s.wm}</div>
        <textarea class="ta" id="ta-${uid}" placeholder="${escH(s.ph)}" rows="5"
          oninput="onInp('${uid}','${s.secId}','${s.baseId}',this)"
          onfocus="onFoc('${uid}')" onblur="onBlr('${uid}')"
        >${escH(val)}</textarea>
      </div>
      <div class="cc" id="cc-${uid}">${val.length} chars</div>
      <div class="tip-panel" id="tip-${uid}">
        <div class="tip-h">📌 What is this?</div><p>${s.tip.what}</p>
        <div class="tip-h" style="margin-top:10px">🧠 Why it matters</div><p>${s.tip.why}</p>
        <div class="tip-h" style="margin-top:10px">✍️ Example</div><div class="tip-ex">${s.tip.ex}</div>
      </div>
    </div>
    `;
  }).join('');

  // restore heights
  secs.forEach((s,i)=>{
    const uid=`${s.secId}-${i}`;
    const ta=document.getElementById('ta-'+uid);
    if(ta&&ta.value){ta.style.height='auto';ta.style.height=Math.max(100,ta.scrollHeight)+'px'}
  });
}

// ════════════════════════════════════════════════
//  GUIDE TAB
// ════════════════════════════════════════════════
function buildGuide(){
  const fwCards=Object.entries(FW).map(([k,fw])=>`
    <div class="fw-card${ST.fw===k?' active-fw':''}" onclick="changeFw('${k}');mode('write');">
      <div class="fw-card-name">${fw.icon} ${fw.name}<span class="fw-card-badge">${fw.sections.length} sections</span></div>
      <div class="fw-card-when" style="margin-top:6px">${fw.when}</div>
      <div class="fw-letters">${fw.letters.map(l=>`<span class="fw-l" style="color:${l.c};border-color:${l.c}33;background:${l.c}11">${l.l}</span>`).join('')}</div>
    </div>
  `).join('');

  const decRows=[
    ['Quick, well-defined task','RTF or TAG','Lean structure; model fills in sensible defaults'],
    ['Complex, multi-step task','RISEN or Custom','Need full instructions + explicit end goal'],
    ['Writing for a specific audience','CO-STAR','Audience field forces you to define the reader'],
    ['Exploratory / iterative task','CRISPE','Experiment field prompts self-evaluation'],
    ['Purpose-first / intent-driven','APE','Forces you to articulate why before what'],
    ['Reasoning or math','CoT + Custom','Add "think step by step" to Instructions'],
    ['You have good examples','Few-Shot (Custom)','Fill the Examples section; this alone beats instructions'],
    ['Model keeps making same mistake','Constraints + CoT','Add explicit Constraints + reasoning instruction'],
    ['High-stakes factual answer','Self-Consistency','Run 3×; take majority answer'],
    ['Multi-tool or agentic workflow','ReAct','Use Thought/Action/Observation loop in Instructions'],
    ['Complex task, breakable','Prompt Chaining','Split into sequential prompts; outputs chain'],
    ['Requires current/proprietary data','RAG','Paste retrieved docs into Context section'],
    ['Math/data manipulation','PAL','Ask for Python code solution in Instructions'],
    ['Need multiple options evaluated','Tree of Thoughts','Three-expert prompt in Instructions'],
    ['Uncertainty/hallucination risk','Generated Knowledge','Two-step: generate facts, then answer'],
    ['Long-context agentic systems','Context Engineering','Design what goes in context window and in what order'],
  ];

  const decTable=`
    <table class="dec-table">
      <thead><tr><th>Condition / Situation</th><th>Best Approach</th><th>Why</th></tr></thead>
      <tbody>${decRows.map(([cond,approach,why])=>`
        <tr><td>${cond}</td><td><span style="color:var(--acc);font-weight:600">${approach}</span></td><td style="color:var(--sub)">${why}</td></tr>
      `).join('')}</tbody>
    </table>
  `;

  const catColors={reason:'cat-reason',retrieve:'cat-retrieve',agentic:'cat-agentic',optim:'cat-optim',context:'cat-context'};

  const techCards=TECHNIQUES.map(t=>`
    <div class="tech-card">
      <div class="tech-top">
        <div style="flex:1"><div class="tech-name">${t.name}</div></div>
        <span class="tech-cat ${catColors[t.cat]||'cat-reason'}">${t.catLabel}</span>
      </div>
      <div class="tech-desc">${t.desc}</div>
      <div class="tech-when" style="font-size:11.5px;color:var(--dim)">
        <strong style="color:var(--sub)">Use when:</strong> ${t.when.map(w=>`<span style="display:inline-block;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:1px 7px;margin:2px 2px 0 0;font-size:11px">${w}</span>`).join('')}
      </div>
      <div class="tech-snippet">${escH(t.snippet)}</div>
      <div class="tech-actions">
        <button class="tech-btn" onclick="copyText('${escH(t.snippet).replace(/'/g,"&#39;")}','${escH(t.name)} copied!')">Copy snippet</button>
        <button class="tech-btn inject" onclick="injectTech('${t.injectTo}','${escH(t.snippet).replace(/'/g,"&#39;")}','${escH(t.name)}')">→ Inject into prompt</button>
      </div>
    </div>
  `).join('');

  document.getElementById('p-guide').innerHTML=`
    <div class="g-section-title">Choose a Framework</div>
    <div class="g-section-desc">Click any framework to switch. All your written content is preserved.</div>
    <div class="guide-grid">${fwCards}</div>

    <div class="g-section-title">When to Use What</div>
    <div class="g-section-desc">Match your situation to the right approach. Frameworks and techniques stack — you can use both.</div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:32px">${decTable}</div>

    <div class="g-section-title">Advanced Techniques Library</div>
    <div class="g-section-desc">Techniques change how the model reasons, not just what information you give it. Use "Inject" to add the technique snippet to your active prompt.</div>
    <div class="tech-grid">${techCards}</div>
  `;
}

// ════════════════════════════════════════════════
//  EVENTS
// ════════════════════════════════════════════════
function onInp(uid,secId,baseId,el){
  ST.vals[secId]=el.value;
  ST.vals[baseId]=el.value;
  el.style.height='auto';
  el.style.height=Math.max(100,el.scrollHeight)+'px';
  document.getElementById('wm-'+uid).classList.toggle('gone',!!el.value.trim());
  document.getElementById('cc-'+uid).textContent=el.value.length+' chars';
  const n=document.querySelector(`[id^="n-${secId}"]`);
  n&&n.classList.toggle('has-content',!!el.value.trim());
  saveST();
}
function onFoc(uid){document.querySelector(`[id^="n-"][id*="${uid.split('-')[0]}"]`)?.classList.add('lit')}
function onBlr(uid){document.querySelector(`[id^="n-"][id*="${uid.split('-')[0]}"]`)?.classList.remove('lit')}
function flipTip(uid){
  const p=document.getElementById('tip-'+uid);
  p.classList.toggle('show');
}
function flipOn(secId,uid){
  ST.on[secId]=!ST.on[secId];
  document.getElementById('c-'+uid).classList.toggle('off',!ST.on[secId]);
  document.getElementById('tgl-'+uid).classList.toggle('on',ST.on[secId]);
  saveST();
}
function scrollToSec(uid){document.getElementById('c-'+uid)?.scrollIntoView({behavior:'smooth',block:'center'})}

// Snippets
function toggleSnip(e,uid){
  e.stopPropagation();
  const drop=document.getElementById('sd-'+uid);
  const isOpen=drop.classList.contains('open');
  document.querySelectorAll('.snip-drop.open').forEach(d=>d.classList.remove('open'));
  if(!isOpen)drop.classList.add('open');
  ST.openSnip=isOpen?null:uid;
}
document.addEventListener('click',()=>{
  document.querySelectorAll('.snip-drop.open').forEach(d=>d.classList.remove('open'));
});
function useSnip(uid,si){
  const secs=currentSections();
  const idx=parseInt(uid.split('-').pop());
  const sec=secs[idx]||secs.find(s=>uid.startsWith(s.secId));
  if(!sec)return;
  const baseSnips=DEFAULT_SNIPS[sec.baseId]||[];
  const userSnips=ST.snips[sec.secId]||[];
  const all=[...baseSnips,...userSnips];
  const txt=all[parseInt(si)];
  if(!txt)return;
  const ta=document.getElementById('ta-'+uid);
  if(ta){ta.value=txt;onInp(uid,sec.secId,sec.baseId,ta)}
  document.getElementById('sd-'+uid).classList.remove('open');
  toast('Snippet applied');
}
function saveSnip(uid,secId){
  const ta=document.getElementById('ta-'+uid);
  const txt=ta&&ta.value.trim();
  if(!txt){toast('Section is empty — nothing to save');return}
  if(!ST.snips[secId])ST.snips[secId]=[];
  if(ST.snips[secId].includes(txt)){toast('Already saved');return}
  ST.snips[secId].push(txt);
  saveST();
  toast('Saved as snippet!');
  buildCards(); // rebuild to show new snippet
}

// Inject technique
function injectTech(targetBaseId,snippet,name){
  const secs=currentSections();
  const target=secs.find(s=>s.baseId===targetBaseId)||secs[secs.length-1];
  if(!target)return;
  const uid=`${target.secId}-${secs.indexOf(target)}`;
  const ta=document.getElementById('ta-'+uid);
  if(!ta){toast('Switch to Write tab first');return}
  const existing=ta.value.trim();
  const decoded=snippet.replace(/&#39;/g,"'").replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
  ta.value=existing?(existing+'\n\n['+name+']\n'+decoded):('['+name+']\n'+decoded);
  onInp(uid,target.secId,target.baseId,ta);
  if(ST.mode!=='write')mode('write');
  setTimeout(()=>{ta.scrollIntoView({behavior:'smooth',block:'center'}); ta.focus()},150);
  toast(name+' injected into '+target.title);
}

// ════════════════════════════════════════════════
//  MODE
// ════════════════════════════════════════════════
function mode(m){
  ST.mode=m;
  ['write','preview','assemble','guide'].forEach(x=>{
    document.getElementById('p-'+x).style.display=x===m?'block':'none';
    document.getElementById('m-'+x).classList.toggle('on',x===m);
  });
  if(m==='preview')renderPreview();
  if(m==='assemble')renderAssemble();
  if(m==='guide')buildGuide();
}
function renderPreview(){
  const a=activeSecs();
  const el=document.getElementById('pv-out');
  if(!a.length){el.innerHTML='<p style="color:var(--sub);font-style:italic;font-size:13px">Nothing written yet — switch to Write and fill in some sections.</p>';return}
  el.innerHTML=`
    <div class="pv-hdr"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>Preview — ${currentFW().name}</div>
    ${a.map((s,i)=>`
      <div class="pv-sec">
        <div class="pv-lbl">${s.tag} — ${s.title}</div>
        <div class="pv-body">${marked.parse(getVal(s))}</div>
      </div>
      ${i<a.length-1?'<hr class="pv-div">':''}
    `).join('')}
  `;
}
function renderAssemble(){
  const txt=assembleText();
  document.getElementById('as-out').textContent=txt||'Nothing written yet.';
  const words=txt.trim()?txt.trim().split(/\s+/).length:0;
  document.getElementById('as-w').textContent=words.toLocaleString();
  document.getElementById('as-c').textContent=txt.length.toLocaleString();
  document.getElementById('as-t').textContent=Math.round(txt.length/4).toLocaleString();
}

// ════════════════════════════════════════════════
//  FRAMEWORK SWITCH
// ════════════════════════════════════════════════
function changeFw(k){
  ST.fw=k;
  document.getElementById('fw-sel').value=k;
  saveST();
  buildSb(); buildFwBanner(); buildCards();
  if(ST.mode==='guide')buildGuide();
}

// ════════════════════════════════════════════════
//  ACTIONS
// ════════════════════════════════════════════════
function copySec(uid,secId){
  const v=ST.vals[secId]||'';
  if(!v.trim()){toast('Section is empty');return}
  navigator.clipboard.writeText(v).then(()=>{toast('Section copied!'); document.getElementById('c-'+uid).classList.add('flashed'); setTimeout(()=>document.getElementById('c-'+uid).classList.remove('flashed'),500)});
}
function copyFull(){
  const txt=assembleText();
  if(!txt.trim()){toast('Nothing to copy yet');return}
  navigator.clipboard.writeText(txt).then(()=>toast('Prompt copied! ✓'));
}
function copyText(txt,msg){
  const decoded=txt.replace(/&#39;/g,"'").replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
  navigator.clipboard.writeText(decoded).then(()=>toast(msg||'Copied!'));
}
function doClear(){
  if(!confirm('Clear all section content? This cannot be undone.'))return;
  Object.keys(ST.vals).forEach(k=>ST.vals[k]='');
  saveST(); buildCards();
  toast('All cleared');
}
function doExport(){
  const txt=assembleText();
  if(!txt.trim()){toast('Nothing to export');return}
  const full=`# PromptPad Export (${currentFW().name})\n\n${txt}`;
  const b=new Blob([full],{type:'text/markdown'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='prompt.md';a.click();
  toast('Exported as prompt.md');
}
function doLoad(){document.getElementById('file-inp').click()}
document.getElementById('file-inp').addEventListener('change',function(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    const txt=ev.target.result;
    const parts=txt.split(/^##\s+/m).slice(1);
    parts.forEach(part=>{
      const nl=part.indexOf('\n');
      const heading=part.slice(0,nl).trim();
      const body=part.slice(nl+1).trim();
      Object.values(SEC_DEFS).forEach(def=>{
        if(def.title.toLowerCase()===heading.toLowerCase()||def.tag.toLowerCase()===heading.toLowerCase()){
          ST.vals[def.id]=body;
        }
      });
    });
    saveST(); buildCards(); toast('Loaded!');
  };
  r.readAsText(f); this.value='';
});

let _tt;
function toast(msg){
  const el=document.getElementById('toast');
  document.getElementById('toast-msg').textContent=msg;
  el.classList.add('up'); clearTimeout(_tt);
  _tt=setTimeout(()=>el.classList.remove('up'),2600);
}
document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='Enter'){e.preventDefault();copyFull()}
  if((e.metaKey||e.ctrlKey)&&e.key==='1')mode('write');
  if((e.metaKey||e.ctrlKey)&&e.key==='2')mode('preview');
  if((e.metaKey||e.ctrlKey)&&e.key==='3')mode('assemble');
  if((e.metaKey||e.ctrlKey)&&e.key==='4')mode('guide');
  if(e.key==='Escape'){document.querySelectorAll('.snip-drop.open').forEach(d=>d.classList.remove('open'))}
});

// ════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════
loadST();
document.getElementById('fw-sel').value=ST.fw;
buildSb(); buildFwBanner(); buildCards();
['write','preview','assemble','guide'].forEach(x=>document.getElementById('p-'+x).style.display=x==='write'?'block':'none');
</script>
</body>
