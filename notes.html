<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes — PromptPad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #090C14;
      --card:   rgba(255,255,255,.045);
      --border: rgba(255,255,255,.07);
      --text:   #ECF0FF;
      --sub:    #8C9BBE;
      --dim:    #3A4D6E;
      --acc:    #A78BFA;
      --hdr-h:  52px;
    }

    [data-theme="light"] {
      --bg:     #C2D0FF;
      --card:   rgba(255,255,255,.38);
      --border: rgba(255,255,255,.68);
      --text:   #14203A;
      --sub:    #48587A;
      --dim:    #8695B8;
    }

    html, body { height: 100%; }

    body {
      display: flex; flex-direction: column;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 15px; color: var(--text);
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse at 18% 18%, rgba(124,58,237,.15) 0%, transparent 48%),
        radial-gradient(ellipse at 82% 82%, rgba(52,211,153,.08) 0%, transparent 45%),
        radial-gradient(ellipse at 55% 45%, rgba(96,165,250,.05) 0%, transparent 55%);
      background-attachment: fixed;
      -webkit-font-smoothing: antialiased;
    }

    [data-theme="light"] body {
      background-color: #C2D0FF;
      background-image:
        radial-gradient(ellipse at 12% 14%, rgba(147,100,250,.62) 0%, transparent 48%),
        radial-gradient(ellipse at 86% 82%, rgba(32,200,140,.45) 0%, transparent 44%),
        radial-gradient(ellipse at 56% 50%, rgba(80,148,250,.3) 0%, transparent 52%),
        radial-gradient(ellipse at 82% 12%, rgba(247,180,72,.28) 0%, transparent 36%);
    }

    /* ── HEADER ── */
    .hdr {
      height: var(--hdr-h); flex-shrink: 0;
      display: flex; align-items: center; gap: 12px;
      padding: 0 20px;
      background: rgba(9,12,20,.82);
      backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
      border-bottom: 1px solid var(--border);
    }
    [data-theme="light"] .hdr {
      background: rgba(185,205,255,.68);
      border-bottom-color: rgba(255,255,255,.7);
    }

    .back-btn {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 500; color: var(--sub);
      text-decoration: none; padding: 5px 10px; border-radius: 7px;
      border: 1px solid var(--border); background: var(--card);
      transition: all .15s; white-space: nowrap; flex-shrink: 0;
    }
    .back-btn:hover { color: var(--acc); border-color: rgba(167,139,250,.4); background: rgba(167,139,250,.08); }
    .back-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

    .hdr-title {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700; font-size: 15px; color: var(--text);
    }

    .sp { flex: 1; }

    .hdr-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--dim); white-space: nowrap;
    }

    .hdr-hint {
      font-size: 11px; color: var(--dim); white-space: nowrap;
    }

    .theme-btn {
      width: 32px; height: 32px; border-radius: 7px;
      border: 1px solid var(--border); background: var(--card);
      color: var(--sub); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s; flex-shrink: 0;
    }
    .theme-btn:hover { color: var(--acc); border-color: rgba(167,139,250,.4); }

    /* ── SCROLL AREA ── */
    .scroll-area {
      flex: 1; overflow-y: auto; display: flex; justify-content: center;
      padding: 48px 24px 120px;
    }
    .scroll-area::-webkit-scrollbar { width: 4px; }
    .scroll-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── EDITOR ── */
    .editor {
      width: 100%; max-width: 720px;
      outline: none;
    }

    /* ── BLOCK: the core unit ── */
    /*
      Each block is a paragraph/heading/code-block etc.
      In rendered mode: shows formatted HTML.
      In edit mode: shows raw markdown text in a textarea.
    */

    .block {
      position: relative;
      border-radius: 6px;
      margin-bottom: 2px;
      transition: background .1s;
    }

    .block:hover:not(.editing) {
      background: rgba(255,255,255,.03);
    }
    [data-theme="light"] .block:hover:not(.editing) {
      background: rgba(255,255,255,.2);
    }

    /* Click cursor hint on hover */
    .block:not(.editing):hover::before {
      content: '';
      position: absolute; left: -20px; top: 50%; transform: translateY(-50%);
      width: 3px; height: 60%; min-height: 16px;
      background: var(--acc); border-radius: 2px; opacity: .35;
    }

    /* ── RENDERED OUTPUT ── */
    .block-render {
      padding: 5px 10px;
      cursor: text;
      line-height: 1.82;
    }

    .block-render:empty::after {
      content: attr(data-placeholder);
      color: var(--dim);
      font-style: italic;
      pointer-events: none;
    }

    /* Rendered markdown typography */
    .block-render h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 30px; font-weight: 800; letter-spacing: -.6px;
      color: var(--text); line-height: 1.2; padding: 6px 0 4px;
    }
    .block-render h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px; font-weight: 700; letter-spacing: -.3px;
      color: var(--text); line-height: 1.3; padding: 4px 0 3px;
    }
    .block-render h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px; font-weight: 600;
      color: var(--text); line-height: 1.35; padding: 3px 0 2px;
    }
    .block-render p { color: var(--text); margin: 0; }
    .block-render strong { color: var(--text); font-weight: 700; }
    .block-render em { font-style: italic; color: var(--sub); }
    .block-render del { text-decoration: line-through; opacity: .6; }
    .block-render code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13.5px; background: rgba(255,255,255,.08);
      padding: 2px 6px; border-radius: 4px; color: var(--acc);
    }
    [data-theme="light"] .block-render code { background: rgba(0,0,0,.08); }
    .block-render pre {
      background: rgba(255,255,255,.05); border: 1px solid var(--border);
      border-radius: 8px; padding: 14px 18px; overflow-x: auto;
      margin: 4px 0;
    }
    [data-theme="light"] .block-render pre { background: rgba(255,255,255,.35); }
    .block-render pre code { background: transparent; padding: 0; color: var(--text); font-size: 13px; }
    .block-render blockquote {
      border-left: 3px solid var(--acc); padding: 2px 0 2px 14px;
      color: var(--sub); margin: 0;
    }
    .block-render ul, .block-render ol { padding-left: 22px; }
    .block-render li { line-height: 1.75; color: var(--text); margin-bottom: 2px; }
    .block-render hr { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
    .block-render a { color: var(--acc); text-decoration: underline; }

    /* ── RAW EDIT TEXTAREA ── */
    .block.editing .block-render { display: none; }

    .block-ta {
      display: none;
      width: 100%;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(167,139,250,.25);
      border-radius: 6px;
      outline: none; resize: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px; line-height: 1.85;
      color: var(--text); caret-color: var(--acc);
      padding: 8px 10px;
      min-height: 36px;
    }
    [data-theme="light"] .block-ta {
      background: rgba(255,255,255,.45);
      border-color: rgba(167,139,250,.35);
      color: var(--text);
    }
    .block-ta::placeholder { color: var(--dim); font-style: italic; }
    .block.editing .block-ta { display: block; }

    /* ── NEW BLOCK BUTTON ── */
    .add-block {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 10px;
      color: var(--dim); font-size: 13px;
      cursor: text; border-radius: 6px;
      transition: color .15s;
      margin-top: 4px;
    }
    .add-block:hover { color: var(--sub); }
    .add-block::before {
      content: '+';
      font-size: 16px; line-height: 1;
    }
  </style>
</head>
<body>

  <header class="hdr">
    <a class="back-btn" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      PromptPad
    </a>
    <span style="color:var(--border);font-size:14px">|</span>
    <span class="hdr-title">Notes</span>
    <div class="sp"></div>
    <span class="hdr-hint" id="hdr-hint">Click to edit · Enter for new block</span>
    <span style="color:var(--border);font-size:14px;margin:0 4px">·</span>
    <span class="hdr-meta" id="note-meta">0 words</span>
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle theme"></button>
  </header>

  <div class="scroll-area">
    <div class="editor" id="editor"></div>
  </div>

  <script>
    'use strict';

    const STORAGE_KEY = 'pp-notes';
    const editor = document.getElementById('editor');

    // ── Theme ──
    function getTheme() { return localStorage.getItem('pp-theme') || 'dark'; }
    function applyTheme(t) {
      document.documentElement.dataset.theme = t;
      localStorage.setItem('pp-theme', t);
      const btn = document.getElementById('theme-btn');
      if (!btn) return;
      btn.innerHTML = t === 'dark'
        ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>`
        : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
    }
    function toggleTheme() { applyTheme(getTheme() === 'dark' ? 'light' : 'dark'); }

    // ── Meta ──
    function updateMeta() {
      const all = getAllRaw();
      const words = all.trim() ? all.trim().split(/\s+/).length : 0;
      document.getElementById('note-meta').textContent =
        words.toLocaleString() + ' word' + (words !== 1 ? 's' : '');
    }

    // ── Block creation ──
    function createBlock(raw) {
      const wrap = document.createElement('div');
      wrap.className = 'block';

      const render = document.createElement('div');
      render.className = 'block-render';
      if (!raw.trim()) render.setAttribute('data-placeholder', 'Empty block — click to write');

      const ta = document.createElement('textarea');
      ta.className = 'block-ta';
      ta.placeholder = '# Heading   **bold**   *italic*   `code`   > quote   - list';
      ta.rows = 1;
      ta.value = raw;

      wrap.appendChild(render);
      wrap.appendChild(ta);

      renderBlock(wrap, raw);
      wireBlock(wrap);
      return wrap;
    }

    function renderBlock(wrap, raw) {
      const render = wrap.querySelector('.block-render');
      const r = raw.trim();
      if (!r) {
        render.innerHTML = '';
        render.setAttribute('data-placeholder', 'Empty block — click to write');
      } else {
        render.removeAttribute('data-placeholder');
        // marked returns wrapped <p> — keep it minimal
        render.innerHTML = marked.parse(r);
      }
    }

    function autoHeight(ta) {
      ta.style.height = 'auto';
      ta.style.height = Math.max(36, ta.scrollHeight) + 'px';
    }

    // ── Wire events for a block ──
    function wireBlock(wrap) {
      const render = wrap.querySelector('.block-render');
      const ta     = wrap.querySelector('.block-ta');

      // Click rendered → enter edit mode
      render.addEventListener('click', () => enterEdit(wrap));

      // Textarea: auto-height
      ta.addEventListener('input', () => {
        autoHeight(ta);
        saveAll();
        updateMeta();
      });

      // Enter → commit + new block below
      ta.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          commitBlock(wrap);
          const nb = createBlock('');
          wrap.after(nb);
          enterEdit(nb);
          return;
        }

        // Backspace on empty block → remove + focus previous
        if (e.key === 'Backspace' && ta.value === '') {
          e.preventDefault();
          const prev = wrap.previousElementSibling;
          if (prev && prev.classList.contains('block')) {
            wrap.remove();
            saveAll();
            updateMeta();
            enterEdit(prev, true); // focus end of prev
          }
          return;
        }

        // Escape → commit without new block
        if (e.key === 'Escape') {
          commitBlock(wrap);
          ta.blur();
        }

        // Arrow up to prev block
        if (e.key === 'ArrowUp' && ta.selectionStart === 0) {
          const prev = wrap.previousElementSibling;
          if (prev && prev.classList.contains('block')) {
            commitBlock(wrap);
            enterEdit(prev, true);
          }
        }

        // Arrow down to next block
        if (e.key === 'ArrowDown' && ta.selectionEnd === ta.value.length) {
          const next = wrap.nextElementSibling;
          if (next && next.classList.contains('block')) {
            commitBlock(wrap);
            enterEdit(next, false);
          }
        }
      });

      // Blur → commit
      ta.addEventListener('blur', () => {
        // Small delay so click on another block fires first
        setTimeout(() => commitBlock(wrap), 80);
      });
    }

    function enterEdit(wrap, focusEnd) {
      // Commit any other open block first
      editor.querySelectorAll('.block.editing').forEach(b => {
        if (b !== wrap) commitBlock(b);
      });

      wrap.classList.add('editing');
      const ta = wrap.querySelector('.block-ta');
      autoHeight(ta);
      ta.focus();
      if (focusEnd !== undefined) {
        const p = focusEnd ? ta.value.length : 0;
        ta.setSelectionRange(p, p);
      }
    }

    function commitBlock(wrap) {
      if (!wrap.classList.contains('editing')) return;
      const ta  = wrap.querySelector('.block-ta');
      const raw = ta.value;
      wrap.classList.remove('editing');
      renderBlock(wrap, raw);
      saveAll();
    }

    // ── Persist ──
    function getAllRaw() {
      return Array.from(editor.querySelectorAll('.block'))
        .map(b => {
          if (b.classList.contains('editing')) return b.querySelector('.block-ta').value;
          return b.querySelector('.block-ta').value;
        })
        .join('\n\n');
    }

    function saveAll() {
      localStorage.setItem(STORAGE_KEY, getAllRaw());
    }

    // ── Split stored content into blocks ──
    function splitBlocks(markdown) {
      if (!markdown) return [''];
      const blocks = [];
      const lines  = markdown.split('\n');
      let cur = '', inFence = false;

      for (const line of lines) {
        if (/^```/.test(line)) inFence = !inFence;
        if (!inFence && line === '' && cur.trim()) {
          blocks.push(cur.trim());
          cur = '';
        } else {
          cur += (cur ? '\n' : '') + line;
        }
      }
      if (cur.trim()) blocks.push(cur.trim());
      if (!blocks.length || blocks[blocks.length - 1].trim() !== '') blocks.push('');
      return blocks;
    }

    // ── Click on empty area below blocks → add new block ──
    document.querySelector('.scroll-area').addEventListener('click', e => {
      if (e.target.closest('.block') || e.target.closest('.add-block')) return;
      if (e.clientY > editor.getBoundingClientRect().bottom - 20) {
        const last = editor.lastElementChild;
        if (last && last.classList.contains('block')) {
          const lastTa = last.querySelector('.block-ta');
          if (lastTa && lastTa.value.trim() === '') {
            enterEdit(last);
            return;
          }
        }
        const nb = createBlock('');
        editor.appendChild(nb);
        enterEdit(nb);
      }
    });

    // ── Init ──
    applyTheme(getTheme());

    const saved   = localStorage.getItem(STORAGE_KEY) || '';
    const blocks  = splitBlocks(saved);
    blocks.forEach(raw => editor.appendChild(createBlock(raw)));
    updateMeta();
  </script>
</body>
</html>
